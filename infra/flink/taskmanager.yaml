apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
  namespace: stream
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink
      component: taskmanager
  template:
    metadata:
      labels:
        app: flink
        component: taskmanager
    spec:
      containers:
        - name: taskmanager
          image: allocknguyen/my-custom-flink:1.17   
          args: ["taskmanager"]
          ports:
            - containerPort: 6121
          volumeMounts:
            # Sửa đoạn này: chỉ gắn duy nhất file cấu hình
            - name: config-volume
              mountPath: /opt/flink/conf/flink-conf.yaml
              subPath: flink-conf.yaml
      volumes:
        - name: config-volume
          configMap:
            name: flink-config
            # Khai báo rõ ràng key nào trong ConfigMap sẽ được dùng
            items:
              - key: flink-conf.yaml
                path: flink-conf.yaml