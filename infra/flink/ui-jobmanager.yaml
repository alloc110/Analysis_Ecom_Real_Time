apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
  namespace: stream
spec:
  type: NodePort
  ports:
    - name: rpc
      port: 6123
      targetPort: 6123 # Cổng RPC mặc định của Flink
    - name: rest
      port: 8081
      targetPort: 8081 # Cổng Web UI
      nodePort: 30081
    - name: blob
      port: 6124
      targetPort: 6124 # Rất quan trọng để TaskManager tải JAR/Metadata
  selector:
    app: flink
    component: jobmanager # Phải khớp hoàn toàn với label trong Deployment